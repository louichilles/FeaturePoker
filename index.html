<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Poker — Schneider Electric</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; min-height: 100vh; display: flex; flex-direction: column; }

  :root {
    --se-green: #3DCD58;
    --se-green-dark: #2BA147;
    --se-navy: #1B2A47;
    --se-navy-light: #253555;
    --bg-primary: #ffffff;
    --bg-secondary: #f4f5f7;
    --bg-tertiary: #eaecef;
    --text-primary: #1a1a1a;
    --text-secondary: #6b7280;
    --border: rgba(0,0,0,0.12);
    --border-strong: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  .nav {
    background: var(--se-navy);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    border-bottom: 3px solid var(--se-green);
    position: sticky; top: 0; z-index: 20;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; }
  .se-logo {
    width: 28px; height: 28px;
    background: var(--se-green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px; color: #fff; letter-spacing: -0.5px;
  }
  .nav-title { color: #fff; font-size: 15px; font-weight: 500; letter-spacing: 0.2px; }
  .nav-mode-btns { display: flex; gap: 6px; }
  .mode-btn {
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--se-green); color: #fff; border-color: var(--se-green); }
  .mode-btn:not(.active) { background: transparent; color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.2); }
  .mode-btn:not(.active):hover { border-color: rgba(255,255,255,0.5); color: #fff; }

  .tabs-bar {
    background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky; top: 59px; z-index: 15;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 14px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
    user-select: none;
  }
  .tab.active { color: var(--se-green-dark); border-bottom-color: var(--se-green); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text-primary); }
  .tab-add {
    padding: 8px 10px;
    font-size: 20px;
    cursor: pointer;
    color: var(--se-green);
    border-bottom: 2px solid transparent;
    font-weight: 300;
    flex-shrink: 0;
    transition: transform 0.15s;
    line-height: 1;
  }
  .tab-add:hover { transform: scale(1.2); }

  .content { flex: 1; padding: 1.5rem; padding-bottom: 100px; }

  .feature-page { display: flex; flex-direction: column; gap: 1rem; max-width: 860px; margin: 0 auto; }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }

  .section-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }

  .feature-title-input {
    width: 100%;
    font-size: 22px;
    font-weight: 500;
    color: var(--text-primary);
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--border);
    padding: 6px 0;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .feature-title-input:focus { border-bottom-color: var(--se-green); }
  .feature-title-input[readonly] { cursor: default; }

  .desc-area {
    width: 100%;
    min-height: 90px;
    resize: vertical;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .desc-area:focus { border-color: var(--se-green); }
  .desc-area[readonly] { cursor: default; background: var(--bg-secondary); }

  .image-grid { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .img-wrapper { position: relative; }
  .img-thumb {
    width: 120px; height: 90px;
    object-fit: cover;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s;
    display: block;
  }
  .img-thumb:hover { transform: scale(1.03); }
  .img-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 20px; height: 20px;
    background: #e24b4a;
    color: #fff;
    border-radius: 50%;
    border: none;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    line-height: 1;
  }
  .upload-btn {
    width: 120px; height: 90px;
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--radius-md);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 11px;
    transition: border-color 0.15s, color 0.15s;
    background: var(--bg-secondary);
  }
  .upload-btn:hover { border-color: var(--se-green); color: var(--se-green-dark); }
  .upload-icon { font-size: 20px; }

  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }
  .lightbox-img { max-width: 90vw; max-height: 85vh; border-radius: var(--radius-md); object-fit: contain; }
  .lightbox-close {
    position: fixed;
    top: 16px; right: 20px;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
    background: none;
    border: none;
    font-weight: 300;
    line-height: 1;
  }

  .credit-box {
    background: var(--bg-primary);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    margin-top: 0.25rem;
  }
  .credit-box-header {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .credit-badge { width: 8px; height: 8px; border-radius: 50%; background: var(--se-green); display: inline-block; flex-shrink: 0; }
  .credit-input-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .credit-input {
    width: 100px;
    padding: 8px 10px;
    font-size: 16px;
    font-weight: 500;
    text-align: center;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .credit-input:focus { border-color: var(--se-green); }
  .credit-input[readonly] { background: var(--bg-secondary); cursor: default; }
  .credit-hint { font-size: 12px; color: var(--text-secondary); }
  .credit-error { font-size: 12px; color: #e24b4a; font-weight: 500; margin-top: 8px; }

  /* Summary */
  .summary-page { display: flex; flex-direction: column; gap: 1rem; max-width: 860px; margin: 0 auto; }
  .summary-header { display: flex; align-items: center; justify-content: space-between; }
  .summary-title { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .export-btn {
    padding: 7px 14px;
    background: var(--se-green);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .export-btn:hover { background: var(--se-green-dark); }
  .summary-table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 0.5px solid var(--border); }
  .summary-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .summary-table th {
    text-align: left;
    padding: 10px 14px;
    background: var(--se-navy);
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
  }
  .summary-table td {
    padding: 10px 14px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
  }
  .summary-table tr:last-child td { border-bottom: none; }
  .summary-table tbody tr:hover td { background: var(--bg-secondary); }
  .credit-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 12px;
    font-weight: 500;
    background: #eaf3de;
    color: #27500a;
  }
  .credit-pill.zero { background: var(--bg-tertiary); color: var(--text-secondary); }

  /* Sticky footer */
  .credit-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--se-navy);
    padding: 10px 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    border-top: 2px solid var(--se-green);
    z-index: 20;
    flex-wrap: wrap;
  }
  .footer-credits { display: flex; gap: 1.5rem; align-items: center; }
  .footer-stat { display: flex; flex-direction: column; gap: 1px; }
  .footer-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: rgba(255,255,255,0.5); }
  .footer-stat-val { font-size: 15px; font-weight: 500; color: #fff; }
  .footer-stat-val.green { color: var(--se-green); }
  .footer-stat-val.warn { color: #fac775; }
  .footer-stat-val.red { color: #f09595; }
  .footer-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .footer-voter-label { font-size: 12px; color: rgba(255,255,255,0.6); }
  .submit-btn {
    padding: 6px 14px;
    background: var(--se-green);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .submit-btn:hover { background: var(--se-green-dark); }
  .submitted-badge {
    padding: 5px 12px;
    background: rgba(61,205,88,0.15);
    color: var(--se-green);
    border-radius: 4px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid rgba(61,205,88,0.3);
  }
  .change-btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.6);
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .change-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }

  /* Voter login */
  .voter-login {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 1rem;
    gap: 1rem;
    text-align: center;
    max-width: 400px;
    margin: 0 auto;
  }
  .voter-login-logo { width: 56px; height: 56px; background: var(--se-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #fff; }
  .voter-login h2 { font-size: 20px; font-weight: 500; color: var(--text-primary); }
  .voter-login p { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
  .voter-name-input {
    width: 100%;
    max-width: 280px;
    padding: 10px 14px;
    font-size: 15px;
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .voter-name-input:focus { border-color: var(--se-green); }
  .voter-start-btn {
    padding: 10px 28px;
    background: var(--se-green);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  .voter-start-btn:hover { background: var(--se-green-dark); }

  .remove-feature-btn {
    margin-top: 0.5rem;
    padding: 6px 14px;
    background: transparent;
    border: 1px solid #e24b4a;
    color: #e24b4a;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    align-self: flex-start;
    font-family: inherit;
    transition: background 0.15s, color 0.15s;
  }
  .remove-feature-btn:hover { background: #e24b4a; color: #fff; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="nav">
    <div class="nav-logo">
      <div class="se-logo">SE</div>
      <span class="nav-title">Feature Poker</span>
    </div>
    <div class="nav-mode-btns">
      <button class="mode-btn active" id="btn-admin" onclick="switchMode('admin')">Admin</button>
      <button class="mode-btn" id="btn-voter" onclick="switchMode('voter')">Voter</button>
    </div>
  </div>

  <div class="tabs-bar" id="tabs-bar"></div>
  <div class="content" id="main-content"></div>

  <div class="credit-footer" id="credit-footer">
    <div class="footer-credits">
      <div class="footer-stat">
        <span class="footer-stat-label">Total Credits</span>
        <span class="footer-stat-val">100 USD</span>
      </div>
      <div class="footer-stat">
        <span class="footer-stat-label">Remaining Credits</span>
        <span class="footer-stat-val green" id="footer-remaining">100 USD</span>
      </div>
    </div>
    <div class="footer-right" id="footer-right-content"></div>
  </div>

  <div class="lightbox-overlay hidden" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="Mockup">
  </div>
</div>

<input type="file" id="file-input" accept="image/*" multiple style="display:none">

<script>
const TOTAL = 100;
let mode = 'admin';
let currentPage = 0;
let features = [
  { title: 'Feature 1', description: '', images: [] }
];
let voters = {};
let currentVoter = null;
let pendingUploadPage = null;

function getVoterData(name) {
  if (!voters[name]) voters[name] = { credits: features.map(() => 0), submitted: false };
  while (voters[name].credits.length < features.length) voters[name].credits.push(0);
  return voters[name];
}

function voterSpent(name) {
  const d = voters[name];
  if (!d) return 0;
  return d.credits.reduce((a, b) => a + Number(b), 0);
}

function voterRemaining(name) { return TOTAL - voterSpent(name); }

function render() { renderTabs(); renderContent(); renderFooter(); }

function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  bar.innerHTML = '';
  features.forEach((f, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (currentPage === i ? ' active' : '');
    tab.textContent = f.title || ('Feature ' + (i + 1));
    tab.onclick = () => { currentPage = i; render(); };
    bar.appendChild(tab);
  });
  const summaryTab = document.createElement('div');
  summaryTab.className = 'tab' + (currentPage === 'summary' ? ' active' : '');
  summaryTab.textContent = 'Summary';
  summaryTab.onclick = () => { currentPage = 'summary'; render(); };
  bar.appendChild(summaryTab);
  if (mode === 'admin') {
    const addTab = document.createElement('div');
    addTab.className = 'tab-add';
    addTab.title = 'Add feature';
    addTab.textContent = '+';
    addTab.onclick = addFeature;
    bar.appendChild(addTab);
  }
}

function renderContent() {
  const content = document.getElementById('main-content');
  if (currentPage === 'summary') { content.innerHTML = renderSummary(); return; }
  if (mode === 'voter' && !currentVoter) { content.innerHTML = renderVoterLogin(); return; }

  const f = features[currentPage];
  const isAdmin = mode === 'admin';
  const vd = currentVoter ? getVoterData(currentVoter) : null;
  const creditVal = vd ? vd.credits[currentPage] : 0;
  const submitted = vd ? vd.submitted : false;
  const maxCredit = vd ? (voterRemaining(currentVoter) + Number(creditVal)) : 100;

  let imagesHtml = '<div class="image-grid">';
  f.images.forEach((src, idx) => {
    if (isAdmin) {
      imagesHtml += `<div class="img-wrapper">
        <img class="img-thumb" src="${src}" onclick="openLightbox('${src}')" alt="mockup">
        <button class="img-remove" onclick="removeImage(${currentPage},${idx})">&#x2715;</button>
      </div>`;
    } else {
      imagesHtml += `<img class="img-thumb" src="${src}" onclick="openLightbox('${src}')" alt="mockup">`;
    }
  });
  if (isAdmin) {
    imagesHtml += `<div class="upload-btn" onclick="triggerUpload(${currentPage})">
      <span class="upload-icon">&#x2B06;</span><span>Upload</span>
    </div>`;
  }
  imagesHtml += '</div>';

  let creditSection = '';
  if (mode === 'voter' && currentVoter) {
    creditSection = `
      <div class="credit-box">
        <div class="credit-box-header"><span class="credit-badge"></span> How much do you want to spend for the value of this feature?</div>
        <div class="credit-input-row">
          <input type="number" class="credit-input" id="credit-inp" min="0" max="${maxCredit}" step="1"
            value="${creditVal}" ${submitted ? 'readonly' : ''} oninput="onCreditInput(this)">
          <span class="credit-hint" id="credit-hint">Max available: ${maxCredit} USD</span>
        </div>
        ${submitted ? '<div class="credit-error">Votes submitted. No further changes.</div>' : ''}
      </div>`;
  }

  content.innerHTML = `
    <div class="feature-page">
      <div class="section-card">
        <div class="field-label">Feature Title</div>
        <input class="feature-title-input" type="text" placeholder="Enter feature title…"
          value="${escHtml(f.title)}" ${isAdmin ? '' : 'readonly'} oninput="updateTitle(this.value)">
      </div>
      <div class="section-card">
        <div class="field-label">Feature Mockups</div>
        ${imagesHtml}
      </div>
      <div class="section-card">
        <div class="field-label">Feature Description</div>
        <textarea class="desc-area" placeholder="Describe this feature…" ${isAdmin ? '' : 'readonly'}
          oninput="updateDesc(this.value)">${escHtml(f.description)}</textarea>
      </div>
      ${creditSection}
      ${isAdmin && features.length > 1 ? `<button class="remove-feature-btn" onclick="removeFeature()">Remove this feature</button>` : ''}
    </div>`;
}

function renderVoterLogin() {
  return `<div class="voter-login">
    <div class="voter-login-logo">SE</div>
    <h2>Welcome to Feature Poker</h2>
    <p>Enter your name to start voting. You have 100 USD in credits to distribute across all features.</p>
    <input type="text" class="voter-name-input" id="voter-name-inp" placeholder="Your name…" onkeydown="if(event.key==='Enter')startVoting()">
    <button class="voter-start-btn" onclick="startVoting()">Start Voting</button>
  </div>`;
}

function renderSummary() {
  const voterNames = Object.keys(voters);
  if (voterNames.length === 0) {
    return `<div class="summary-page">
      <div class="summary-header"><div class="summary-title">Voting Summary</div></div>
      <p style="font-size:14px;color:var(--text-secondary);margin-top:1rem;">No votes yet. Switch to Voter mode to start voting.</p>
    </div>`;
  }
  let rows = features.map((f, i) => `
    <tr>
      <td style="font-weight:500;">${escHtml(f.title || 'Feature ' + (i+1))}</td>
      ${voterNames.map(v => {
        const c = voters[v].credits[i] || 0;
        return `<td style="text-align:center;"><span class="credit-pill${c==0?' zero':''}">${c} USD</span></td>`;
      }).join('')}
    </tr>`).join('');

  let totalsRow = `<tr style="background:var(--bg-secondary);">
    <td style="font-weight:500;font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;">Total spent</td>
    ${voterNames.map(v => `<td style="text-align:center;font-weight:500;color:var(--se-green-dark);">${voterSpent(v)} / 100 USD</td>`).join('')}
  </tr>`;

  return `<div class="summary-page">
    <div class="summary-header">
      <div class="summary-title">Voting Summary</div>
      <button class="export-btn" onclick="exportCSV()">&#x2B07; Export CSV</button>
    </div>
    <div class="summary-table-wrap">
      <table class="summary-table">
        <thead>
          <tr>
            <th style="min-width:160px;">Feature</th>
            ${voterNames.map(v => `<th style="text-align:center;min-width:100px;">${escHtml(v)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${rows}${totalsRow}</tbody>
      </table>
    </div>
  </div>`;
}

function renderFooter() {
  const footerRight = document.getElementById('footer-right-content');
  const footerRemaining = document.getElementById('footer-remaining');
  if (mode === 'voter' && currentVoter) {
    const rem = voterRemaining(currentVoter);
    const vd = getVoterData(currentVoter);
    footerRemaining.textContent = rem + ' USD';
    footerRemaining.className = 'footer-stat-val' + (rem <= 0 ? ' red' : rem < 30 ? ' warn' : ' green');
    footerRight.innerHTML = `
      <span class="footer-voter-label">Voting as:</span>
      <span style="font-size:13px;font-weight:500;color:#fff;">${escHtml(currentVoter)}</span>
      ${vd.submitted
        ? '<span class="submitted-badge">Submitted</span>'
        : `<button class="submit-btn" onclick="submitVotes()">Submit Votes</button>`}
      <button class="change-btn" onclick="logoutVoter()">Change</button>`;
  } else if (mode === 'voter') {
    footerRemaining.textContent = '100 USD';
    footerRemaining.className = 'footer-stat-val green';
    footerRight.innerHTML = '';
  } else {
    footerRemaining.textContent = '-';
    footerRemaining.className = 'footer-stat-val';
    const count = Object.keys(voters).length;
    footerRight.innerHTML = count > 0
      ? `<span class="footer-voter-label">Voters: ${count}</span>`
      : `<span class="footer-voter-label">Admin mode — no votes tracked</span>`;
  }
}

function switchMode(m) {
  mode = m;
  document.getElementById('btn-admin').className = 'mode-btn' + (m === 'admin' ? ' active' : '');
  document.getElementById('btn-voter').className = 'mode-btn' + (m === 'voter' ? ' active' : '');
  if (currentPage === 'summary') currentPage = 0;
  render();
}

function addFeature() {
  features.push({ title: 'Feature ' + (features.length + 1), description: '', images: [] });
  Object.keys(voters).forEach(v => voters[v].credits.push(0));
  currentPage = features.length - 1;
  render();
}

function removeFeature() {
  if (features.length <= 1) return;
  features.splice(currentPage, 1);
  Object.keys(voters).forEach(v => voters[v].credits.splice(currentPage, 1));
  currentPage = Math.max(0, currentPage - 1);
  render();
}

function updateTitle(val) { features[currentPage].title = val; renderTabs(); }
function updateDesc(val) { features[currentPage].description = val; }

function triggerUpload(pageIdx) {
  pendingUploadPage = pageIdx;
  const fi = document.getElementById('file-input');
  fi.value = '';
  fi.click();
}

document.getElementById('file-input').onchange = function() {
  const files = Array.from(this.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      features[pendingUploadPage].images.push(e.target.result);
      if (++loaded === files.length) render();
    };
    reader.readAsDataURL(file);
  });
};

function removeImage(pageIdx, imgIdx) { features[pageIdx].images.splice(imgIdx, 1); render(); }

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
}

function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lightbox-close')) {
    document.getElementById('lightbox').classList.add('hidden');
  }
}

function startVoting() {
  const inp = document.getElementById('voter-name-inp');
  const name = inp ? inp.value.trim() : '';
  if (!name) { if(inp) inp.focus(); return; }
  currentVoter = name;
  getVoterData(name);
  currentPage = 0;
  render();
}

function logoutVoter() { currentVoter = null; currentPage = 0; render(); }

function onCreditInput(inp) {
  if (!currentVoter) return;
  const vd = getVoterData(currentVoter);
  if (vd.submitted) return;
  let val = parseInt(inp.value) || 0;
  if (val < 0) val = 0;
  const maxAvail = TOTAL - voterSpent(currentVoter) + Number(vd.credits[currentPage]);
  if (val > maxAvail) { val = maxAvail; inp.value = val; }
  vd.credits[currentPage] = val;
  const hint = document.getElementById('credit-hint');
  if (hint) hint.textContent = 'Max available: ' + (TOTAL - voterSpent(currentVoter) + val) + ' USD';
  renderFooter();
}

function submitVotes() {
  if (!currentVoter) return;
  getVoterData(currentVoter).submitted = true;
  render();
}

function exportCSV() {
  const voterNames = Object.keys(voters);
  let csv = 'Feature,' + voterNames.map(v => '"' + v.replace(/"/g, '""') + '"').join(',') + '\n';
  features.forEach((f, i) => {
    const title = '"' + (f.title || 'Feature ' + (i + 1)).replace(/"/g, '""') + '"';
    csv += title + ',' + voterNames.map(v => voters[v].credits[i] || 0).join(',') + '\n';
  });
  csv += '"Total Spent",' + voterNames.map(v => voterSpent(v)).join(',') + '\n';
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'feature-poker-results.csv'; a.click();
  URL.revokeObjectURL(url);
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
